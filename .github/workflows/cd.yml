name: CD

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build binary (amd64)
        env:
          GOOS: linux
          GOARCH: amd64
        run: |
          go build -o govent-linux-amd64 ./cmd/govent

      - name: Build binary (arm64)
        env:
          GOOS: linux
          GOARCH: arm64
        run: |
          go build -o govent-linux-arm64 ./cmd/govent

      - name: Build macOS binary (amd64)
        env:
          GOOS: darwin
          GOARCH: amd64
        run: |
          go build -o govent-darwin-amd64 ./cmd/govent

      - name: Build macOS binary (arm64)
        env:
          GOOS: darwin
          GOARCH: arm64
        run: |
          go build -o govent-darwin-arm64 ./cmd/govent

      - name: Build Windows binary (amd64)
        env:
          GOOS: windows
          GOARCH: amd64
        run: |
          go build -o govent-windows-amd64.exe ./cmd/govent

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            govent-linux-amd64
            govent-linux-arm64
            govent-darwin-amd64
            govent-darwin-arm64
            govent-windows-amd64.exe
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
